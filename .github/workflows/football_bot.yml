#!/usr/bin/env python3
"""
Football Bot - Telegram 版本
每天台灣時間 18:00 發送：昨日賽果 + 今日預測（含進球者、助攻、統計分析）
支持聯賽：英超(EPL)、西甲(La Liga)、意甲(Serie A)、德甲(Bundesliga)、法甲(Ligue 1)
"""

import os
import asyncio
import logging
import requests
from datetime import datetime, timedelta, timezone
from telegram import Bot
from telegram.constants import ParseMode

logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
logger = logging.getLogger(__name__)

TELEGRAM_BOT_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
TELEGRAM_CHAT_ID   = os.environ["TELEGRAM_CHAT_ID"]
FOOTBALL_API_KEY   = os.environ.get("FOOTBALL_API_KEY", "")  # API-Football key

# API 端點
FOOTBALL_API_BASE  = "https://api-football-v1.p.rapidapi.com/v3"

# 聯賽配置 (league_id: league_name)
LEAGUES = {
    39: {"name": "English Premier League", "emoji": "🇬🇧", "abbr": "EPL"},
    140: {"name": "La Liga", "emoji": "🇪🇸", "abbr": "La Liga"},
    135: {"name": "Serie A", "emoji": "🇮🇹", "abbr": "Serie A"},
    78: {"name": "Bundesliga", "emoji": "🇩🇪", "abbr": "BL"},
    61: {"name": "Ligue 1", "emoji": "🇫🇷", "abbr": "L1"},
}

SEASON = 2024  # 當前賽季


# ── API 工具 ───────────────────────────────────────────

def get_headers():
    """返回 API 請求頭"""
    return {
        "x-rapidapi-key": FOOTBALL_API_KEY,
        "x-rapidapi-host": "api-football-v1.p.rapidapi.com"
    }


def get_matches_by_date(date_str: str) -> dict:
    """
    獲取指定日期的所有比賽
    date_str: YYYY-MM-DD 格式
    """
    try:
        params = {"date": date_str}
        resp = requests.get(
            f"{FOOTBALL_API_BASE}/fixtures",
            headers=get_headers(),
            params=params,
            timeout=10
        )
        resp.raise_for_status()
        return resp.json()
    except Exception as e:
        logger.warning("無法取得比賽數據 (%s): %s", date_str, e)
        return {"response": []}


def get_match_statistics(fixture_id: int) -> dict:
    """獲取比賽詳細統計"""
    try:
        resp = requests.get(
            f"{FOOTBALL_API_BASE}/fixtures/statistics",
            headers=get_headers(),
            params={"fixture": fixture_id},
            timeout=10
        )
        resp.raise_for_status()
        return resp.json()
    except Exception as e:
        logger.warning("無法取得比賽統計 (%d): %s", fixture_id, e)
        return {"response": []}


def get_match_events(fixture_id: int) -> dict:
    """獲取比賽事件（進球、卡牌等）"""
    try:
        resp = requests.get(
            f"{FOOTBALL_API_BASE}/fixtures/events",
            headers=get_headers(),
            params={"fixture": fixture_id},
            timeout=10
        )
        resp.raise_for_status()
        return resp.json()
    except Exception as e:
        logger.warning("無法取得比賽事件 (%d): %s", fixture_id, e)
        return {"response": []}


def get_team_form(team_id: int, last_n: int = 5) -> str:
    """
    獲取球隊近期戰績
    返回: 'LWWWL' 格式，W=勝 D=平 L=負
    """
    try:
        resp = requests.get(
            f"{FOOTBALL_API_BASE}/teams/statistics",
            headers=get_headers(),
            params={"team": team_id, "season": SEASON},
            timeout=10
        )
        resp.raise_for_status()
        data = resp.json()
        
        # 簡化：返回勝/平/負統計
        if data.get("response"):
            form = data["response"].get("form", "")
            return form if form else "N/A"
        return "N/A"
    except Exception as e:
        logger.warning("無法取得球隊戰績: %s", e)
        return "N/A"


# ── 資料解析 ───────────────────────────────────────────

def filter_league_matches(matches: list) -> list:
    """過濾只保留目標聯賽的比賽"""
    filtered = []
    for match in matches:
        league_id = match.get("league", {}).get("id")
        if league_id in LEAGUES:
            filtered.append(match)
    return filtered


def parse_match(match_data: dict) -> dict:
    """解析比賽數據"""
    fixture = match_data.get("fixture", {})
    teams = match_data.get("teams", {})
    goals = match_data.get("goals", {})
    league = match_data.get("league", {})
    
    home_team = teams.get("home", {})
    away_team = teams.get("away", {})
    
    return {
        "fixture_id": fixture.get("id"),
        "date": fixture.get("date"),
        "status": fixture.get("status", {}).get("short", "?"),
        "home_id": home_team.get("id"),
        "home_name": home_team.get("name", "Unknown"),
        "away_id": away_team.get("id"),
        "away_name": away_team.get("name", "Unknown"),
        "home_score": goals.get("home", 0),
        "away_score": goals.get("away", 0),
        "league_id": league.get("id"),
        "league_name": LEAGUES.get(league.get("id"), {}).get("abbr", ""),
        "completed": fixture.get("status", {}).get("elapsed") is not None and 
                     fixture.get("status", {}).get("short") in ["FT", "AET", "PEN"],
    }


def get_goals_and_assists(fixture_id: int) -> dict:
    """
    獲取進球者和助攻者
    返回: {
        "goals": [{"player": "name", "team": "home/away", "minute": 45}],
        "assists": [{"player": "name", "team": "home/away"}]
    }
    """
    events = get_match_events(fixture_id)
    goals = []
    assists = []
    
    for event in events.get("response", []):
        if event.get("type") == "Goal":
            goals.append({
                "player": event.get("player", {}).get("name", "Unknown"),
                "team": "home" if event.get("team", {}).get("id") == event.get("team", {}).get("id") else "away",
                "minute": event.get("time", {}).get("elapsed", "?"),
                "assist": event.get("assist", {}).get("name") if event.get("assist") else None
            })
        elif event.get("type") == "Assist" and event.get("assist"):
            assists.append({
                "player": event.get("assist", {}).get("name", "Unknown"),
                "team": "home" if event.get("team", {}).get("id") else "away"
            })
    
    return {"goals": goals, "assists": assists}


def predict_match(home_team: dict, away_team: dict) -> dict:
    """
    簡單的比賽預測邏輯
    基於球隊主客場表現、進攻防守指數等
    """
    home_form = get_team_form(home_team["id"])
    away_form = get_team_form(away_team["id"])
    
    # 計算簡單得分
    home_score = 0
    away_score = 0
    
    # 主場優勢
    home_score += 0.3
    
    # 戰績加分
    if "W" in home_form[:2]:
        home_score += 0.4
    if "L" in home_form[:2]:
        away_score += 0.3
    
    return {
        "prediction": "Home" if home_score > away_score else "Away" if away_score > home_score else "Draw",
        "confidence": "中",
        "reason": f"主隊戰績: {home_form} vs 客隊: {away_form}"
    }


# ── 格式化 ─────────────────────────────────────────────

def format_result_block(match: dict) -> str:
    """格式化已完成的比賽結果"""
    home, away = match["home_name"], match["away_name"]
    hs, as_ = match["home_score"], match["away_score"]
    
    if match["completed"]:
        winner_emoji = "✅" if hs > as_ else "⚽" if hs < as_ else "🤝"
        score_line = f"*{away} {as_}  —  {hs} {home}*  {winner_emoji}"
    else:
        score_line = f"*{away} vs {home}*  ⏳ {match['status']}"
    
    lines = [f"{LEAGUES.get(match['league_id'], {}).get('emoji', '')} {score_line}"]
    
    # 獲取進球者信息
    if match["completed"] and (hs > 0 or as_ > 0):
        goals_data = get_goals_and_assists(match["fixture_id"])
        goals = goals_data.get("goals", [])
        
        if goals:
            lines.append("⚽ *進球者*")
            home_goals = [g for g in goals if g["team"] == "home"]
            away_goals = [g for g in goals if g["team"] == "away"]
            
            for goal in away_goals:
                assist = f" (助攻: {goal['assist']})" if goal.get("assist") else ""
                lines.append(f"  {goal['minute']}' {goal['player']}{assist}")
            
            for goal in home_goals:
                assist = f" (助攻: {goal['assist']})" if goal.get("assist") else ""
                lines.append(f"  {goal['minute']}' {goal['player']}{assist}")
    
    return "\n".join(lines)


def format_preview_block(match: dict) -> str:
    """格式化比賽預測"""
    home, away = match["home_name"], match["away_name"]
    home_id, away_id = match["home_id"], match["away_id"]
    
    lines = [f"{LEAGUES.get(match['league_id'], {}).get('emoji', '')} *{away} vs {home}*"]
    
    # 戰績
    home_form = get_team_form(home_id)
    away_form = get_team_form(away_id)
    
    if home_form != "N/A" or away_form != "N/A":
        lines.append("📊 *近期戰績*")
        lines.append(f"  {home}: {home_form}")
        lines.append(f"  {away}: {away_form}")
    
    # 預測
    pred = predict_match(
        {"id": home_id, "name": home},
        {"id": away_id, "name": away}
    )
    
    lines.append("🔮 *預測*")
    lines.append(f"  預測結果：{pred['prediction']}")
    lines.append(f"  信心度：{pred['confidence']}")
    
    return "\n".join(lines)


# ── 主報告生成 ─────────────────────────────────────────

def build_full_report(today_str: str, tomorrow_str: str) -> str:
    """
    構建完整報告
    today_str, tomorrow_str: YYYY-MM-DD 格式
    """
    logger.info("抓取比賽數據…")
    
    today_data = get_matches_by_date(today_str)
    tomorrow_data = get_matches_by_date(tomorrow_str)
    
    today_matches = filter_league_matches([parse_match(m) for m in today_data.get("response", [])])
    tomorrow_matches = filter_league_matches([parse_match(m) for m in tomorrow_data.get("response", [])])
    
    sections = []
    
    # ── 昨日賽果 ──
    if today_matches:
        sections.append(f"⚽ *昨日賽果 — {today_str}*（共 {len(today_matches)} 場）\n")
        for match in today_matches:
            sections.append(format_result_block(match))
            sections.append("─" * 28)
    else:
        sections.append(f"⚽ *昨日賽果 — {today_str}*\n\n昨天沒有比賽 🏖️")
        sections.append("─" * 28)
    
    # ── 今日預測 ──
    if tomorrow_matches:
        sections.append(f"\n🔮 *今日預測 — {tomorrow_str}*（共 {len(tomorrow_matches)} 場）\n")
        for match in tomorrow_matches:
            sections.append(format_preview_block(match))
            sections.append("─" * 28)
    else:
        sections.append(f"\n🔮 *今日預測 — {tomorrow_str}*\n\n今天沒有比賽 🏖️")
    
    sections.append("\n⚠️ _預測僅供參考，非投注依據_\n_由 Football Bot 自動產生 🤖_")
    return "\n".join(sections)


async def main():
    tw_now = datetime.now(timezone.utc) + timedelta(hours=8)
    today_str = (tw_now - timedelta(days=1)).strftime("%Y-%m-%d")
    tomorrow_str = tw_now.strftime("%Y-%m-%d")
    
    logger.info("產生報告：昨日 %s + 今日 %s", today_str, tomorrow_str)
    
    try:
        report = build_full_report(today_str, tomorrow_str)
    except Exception as e:
        import traceback
        report = f"⚠️ 取得報告失敗：{e}"
        logger.error(report)
        logger.error(traceback.format_exc())
    
    bot = Bot(token=TELEGRAM_BOT_TOKEN)
    await bot.send_message(
        chat_id=TELEGRAM_CHAT_ID,
        text=report,
        parse_mode=ParseMode.MARKDOWN
    )
    logger.info("已發送 ✅")


if __name__ == "__main__":
    asyncio.run(main())
